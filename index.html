<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aplikasi interaktif Sahabat Numerik untuk mempelajari dan mencari akar persamaan non-linear secara mudah dengan Metode Secant."
    />

    <title>Sahabat Numerik - Home</title>

    <!-- Font & Integrasi Stylesheet -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --text-dark: #2d3436;
        --text-muted: #636e72;
        --primary: #b493d6;
        --primary-light: #f3ebf8;
        --gradient-btn: linear-gradient(135deg, #f78ca0, #b493d6);
        --bg-color: #fafbfd;
        --card-bg: #ffffff;
        --border-color: #e2e8f0;
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Nunito", sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      /* --- NAVIGASI (Sama Persis dengan Halaman Lain) --- */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.2rem 8%;
        background-color: #ffffff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        letter-spacing: -0.5px;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 2.5rem;
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--text-dark);
        font-weight: 700;
        font-size: 1.05rem;
        transition: var(--transition);
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary);
      }

      .ai-menu {
        background: rgba(180, 147, 214, 0.15);
        padding: 0.6rem 1.2rem;
        border-radius: 50px;
        color: #8c7ae6 !important;
        border: 2px solid transparent;
        transition: var(--transition);
      }

      .ai-menu:hover {
        border-color: #8c7ae6;
        background: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(140, 122, 230, 0.2);
      }

      .menu-toggle {
        display: none;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
        z-index: 101;
      }

      .menu-toggle span {
        width: 30px;
        height: 3px;
        background-color: var(--primary);
        border-radius: 5px;
        transition: var(--transition);
      }

      /* --- KONTEN UTAMA HOME --- */
      .hero-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 3rem 1.5rem;
        max-width: 800px;
        margin: auto;
        animation: fadeIn 0.8s ease-out;
        width: 100%;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .mascot {
        font-size: 5.5rem;
        animation: float 3s ease-in-out infinite;
        margin-bottom: 1.5rem;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      h1 {
        font-size: 3.5rem;
        font-weight: 900;
        color: var(--text-dark);
        margin-bottom: 1rem;
        letter-spacing: -1px;
      }

      .hero-container p {
        font-size: 1.2rem;
        color: var(--text-muted);
        line-height: 1.8;
        max-width: 600px;
        margin-bottom: 3rem;
        font-weight: 600;
      }

      /* --- TOMBOL (Menyesuaikan Gaya Elemen di Kalkulator & Materi) --- */
      .btn-group {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        max-width: 320px;
      }

      .btn-main {
        display: block;
        width: 100%;
        padding: 1rem 2rem;
        background: var(--gradient-btn);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 8px 15px rgba(180, 147, 214, 0.3);
        text-align: center;
      }

      .btn-main:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(180, 147, 214, 0.4);
      }

      .btn-outline {
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
        box-shadow: none;
      }

      .btn-outline:hover {
        background: var(--primary-light);
        color: var(--primary);
        transform: translateY(-3px);
      }

      .btn-dark-outline {
        background: transparent;
        border: 2px solid var(--text-dark);
        color: var(--text-dark);
        box-shadow: none;
      }

      .btn-dark-outline:hover {
        background: #f1f5f9;
        transform: translateY(-3px);
      }

      /* --- RESPONSIVE MOBILE NAV --- */
      @media (max-width: 850px) {
        .navbar {
          padding: 1.2rem 5%;
        }
        .menu-toggle {
          display: flex;
        }
        .nav-links {
          position: absolute;
          top: 100%;
          left: 0;
          width: 100%;
          background-color: #ffffff;
          flex-direction: column;
          padding: 2rem 0;
          gap: 1.5rem;
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
          clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
          transition: var(--transition);
          pointer-events: none;
        }
        .nav-links.active {
          clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
          pointer-events: all;
        }
        .menu-toggle.active span:nth-child(1) {
          transform: translateY(9px) rotate(45deg);
        }
        .menu-toggle.active span:nth-child(2) {
          opacity: 0;
        }
        .menu-toggle.active span:nth-child(3) {
          transform: translateY(-9px) rotate(-45deg);
        }
        h1 {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigasi -->
    <nav class="navbar">
      <a href="index.html" class="logo">✨ Secant-Calc</a>
      <div class="menu-toggle" id="mobile-menu">
        <span></span><span></span><span></span>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="materi.html">Materi</a></li>
        <li><a href="kalkulator.html">Kalkulator</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li><a href="seka.html" class="ai-menu">Tanya Seka AI 🤖</a></li>
      </ul>
    </nav>

    <!-- Konten Utama -->
    <div class="hero-container">
      <div class="mascot">📈🤖</div>
      <h1>Sahabat Numerik</h1>
      <p>
        Mencari akar persamaan non-linear bikin pusing? Tenang, mari selesaikan
        dengan Metode Secant. Cepat, interaktif, dan nggak bikin stres!
      </p>

      <div class="btn-group">
        <a href="materi.html" class="btn-main btn-outline"
          >Pelajari Materi 📚</a
        >
        <a href="kalkulator.html" class="btn-main">Mulai Menghitung 🚀</a>
        <a href="quiz.html" class="btn-main btn-dark-outline"
          >Uji Pemahaman 🎯</a
        >
      </div>
    </div>

    <!-- Script Hamburger Menu Logic -->
    <script>
      const menuToggle = document.getElementById("mobile-menu");
      const navLinks = document.getElementById("nav-links");
      menuToggle.addEventListener("click", () => {
        menuToggle.classList.toggle("active");
        navLinks.classList.toggle("active");
      });
    </script>
  </body>
</html>
