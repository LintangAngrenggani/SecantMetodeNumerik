<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Secant - Sahabat Numerik</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --text-dark: #2d3436;
        --text-muted: #636e72;
        --primary: #b493d6;
        --primary-light: #f3ebf8;
        --gradient-btn: linear-gradient(135deg, #f78ca0, #b493d6);
        --bg-color: #fafbfd;
        --card-bg: #ffffff;
        --border-color: #e2e8f0;
        --success: #2ecc71;
        --danger: #e74c3c;
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Nunito", sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      /* --- NAVIGASI --- */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.2rem 8%;
        background-color: #ffffff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 2.5rem;
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--text-dark);
        font-weight: 700;
        font-size: 1.05rem;
        transition: var(--transition);
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary);
      }

      .ai-menu {
        background: rgba(180, 147, 214, 0.15);
        padding: 0.6rem 1.2rem;
        border-radius: 50px;
        color: #8c7ae6 !important;
        border: 2px solid transparent;
        transition: var(--transition);
      }

      .ai-menu:hover {
        border-color: #8c7ae6;
        background: white;
        transform: translateY(-2px);
      }

      .menu-toggle {
        display: none;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
        z-index: 101;
      }

      .menu-toggle span {
        width: 30px;
        height: 3px;
        background-color: var(--primary);
        border-radius: 5px;
        transition: var(--transition);
      }

      /* --- KONTEN QUIZ --- */
      .container {
        flex: 1;
        max-width: 800px;
        margin: 3rem auto;
        padding: 0 1.5rem;
        animation: fadeIn 0.8s ease-out;
        width: 100%;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header-title {
        text-align: center;
        margin-bottom: 3rem;
      }

      .header-title h1 {
        font-size: 2.8rem;
        font-weight: 900;
        color: var(--text-dark);
        margin-bottom: 0.5rem;
      }

      .header-title p {
        color: var(--text-muted);
        font-size: 1.1rem;
        font-weight: 600;
      }

      /* KARTU SOAL */
      .quiz-card {
        background: var(--card-bg);
        padding: 2.5rem;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        margin-bottom: 2rem;
      }

      .question-block {
        margin-bottom: 2.5rem;
        border-bottom: 2px dashed var(--border-color);
        padding-bottom: 2rem;
        animation: fadeIn 0.5s ease-in;
      }

      .question-block:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      .question-text {
        font-size: 1.25rem;
        font-weight: 800;
        margin-bottom: 1.5rem;
        color: var(--text-dark);
        line-height: 1.5;
      }

      .question-text span {
        color: var(--primary);
        margin-right: 0.5rem;
      }

      /* OPSI JAWABAN MODERN */
      .options-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .option-label {
        display: flex;
        align-items: center;
        padding: 1.2rem;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        color: var(--text-muted);
        background-color: #f8fafc;
      }

      .option-label input[type="radio"] {
        display: none;
      }

      .option-text {
        width: 100%;
        transition: var(--transition);
      }

      /* --- PERBAIKAN CSS UNTUK SELEKSI BROWSER UNIVERSAL --- */
      .option-label:hover:not(.disabled) {
        border-color: var(--primary);
        background-color: var(--primary-light);
        color: var(--primary);
      }

      /* Class 'selected' ditambahkan manual oleh JavaScript */
      .option-label.selected:not(.disabled) {
        border-color: var(--primary);
        background-color: var(--primary-light);
        box-shadow: 0 4px 10px rgba(180, 147, 214, 0.2);
      }

      .option-label.selected:not(.disabled) .option-text {
        color: var(--primary);
        font-weight: 800;
      }

      /* STATUS BENAR SALAH */
      .option-label.disabled {
        pointer-events: none;
        cursor: not-allowed;
      }

      .option-label.correct-answer {
        border-color: var(--success) !important;
        background-color: rgba(46, 204, 113, 0.1) !important;
      }

      .option-label.correct-answer .option-text {
        color: var(--success) !important;
        font-weight: 800;
      }

      .option-label.wrong-answer {
        border-color: var(--danger) !important;
        background-color: rgba(231, 76, 60, 0.1) !important;
      }

      .option-label.wrong-answer .option-text {
        color: var(--danger) !important;
      }

      /* TOMBOL SUBMIT & HASIL */
      .btn-submit {
        width: 100%;
        padding: 1.2rem;
        background: var(--gradient-btn);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1.2rem;
        font-weight: 800;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 8px 15px rgba(180, 147, 214, 0.3);
        margin-bottom: 3rem;
      }

      .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(180, 147, 214, 0.4);
      }

      .result-container {
        display: none;
        background: var(--card-bg);
        padding: 3rem;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        margin-bottom: 3rem;
        animation: fadeIn 0.5s ease-out;
        border-top: 5px solid var(--primary);
      }

      .result-heading {
        margin-bottom: 1rem;
      }

      .score-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: var(--primary-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        font-weight: 900;
        color: var(--primary);
        margin: 0 auto 1.5rem auto;
        border: 5px solid var(--primary);
      }

      .feedback-title {
        color: var(--text-dark);
        margin-bottom: 0.5rem;
      }

      .feedback-text {
        color: var(--text-muted);
      }

      .btn-retry {
        margin-top: 2rem;
        width: auto;
        padding: 1rem 2rem;
        background: #2d3436;
        box-shadow: 0 8px 15px rgba(45, 52, 54, 0.2);
      }

      .btn-retry:hover {
        box-shadow: 0 12px 25px rgba(45, 52, 54, 0.3);
      }

      /* RESPONSIVE */
      @media (max-width: 850px) {
        .navbar {
          padding: 1.2rem 5%;
        }
        .menu-toggle {
          display: flex;
        }
        .nav-links {
          position: absolute;
          top: 100%;
          left: 0;
          width: 100%;
          background-color: #ffffff;
          flex-direction: column;
          padding: 2rem 0;
          gap: 1.5rem;
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
          clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
          transition: var(--transition);
          pointer-events: none;
        }
        .nav-links.active {
          clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
          pointer-events: all;
        }
        .menu-toggle.active span:nth-child(1) {
          transform: translateY(9px) rotate(45deg);
        }
        .menu-toggle.active span:nth-child(2) {
          opacity: 0;
        }
        .menu-toggle.active span:nth-child(3) {
          transform: translateY(-9px) rotate(-45deg);
        }

        .header-title h1 {
          font-size: 2.2rem;
        }
        .quiz-card {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="logo">✨ Secant-Calc</a>
      <div class="menu-toggle" id="mobile-menu">
        <span></span><span></span><span></span>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="materi.html">Materi</a></li>
        <li><a href="kalkulator.html">Kalkulator</a></li>
        <li><a href="quiz.html" class="active">Quiz</a></li>
        <li><a href="seka.html" class="ai-menu">Tanya Seka AI 🤖</a></li>
      </ul>
    </nav>

    <div class="container">
      <div class="header-title">
        <h1>Uji Pemahamanmu 🎯</h1>
        <p>Seberapa jauh kamu memahami Metode Secant?</p>
      </div>

      <form id="quiz-form">
        <div class="quiz-card" id="quiz-container"></div>

        <button
          type="button"
          id="submit-btn"
          class="btn-submit"
          onclick="checkAnswers()"
        >
          Lihat Hasil Penilaian 🏆
        </button>
      </form>

      <div class="result-container" id="result-box">
        <h2 class="result-heading">Skor Kamu</h2>
        <div class="score-circle" id="score-display">0</div>
        <h3 id="feedback-title" class="feedback-title"></h3>
        <p id="feedback-text" class="feedback-text"></p>
        <button class="btn-submit btn-retry" onclick="location.reload()">
          Ulangi Quiz ↻
        </button>
      </div>
    </div>

    <script>
      // Hamburger Menu Logic
      const menuToggle = document.getElementById("mobile-menu");
      const navLinks = document.getElementById("nav-links");
      menuToggle.addEventListener("click", () => {
        menuToggle.classList.toggle("active");
        navLinks.classList.toggle("active");
      });

      // --- SISTEM BANK SOAL DINAMIS ---
      const bankSoal = [
        {
          question:
            "Apa kelemahan utama Metode Newton-Raphson yang berhasil diatasi oleh Metode Secant?",
          options: [
            "Proses iterasi memakan waktu lebih lama",
            "Membutuhkan tiga nilai tebakan awal",
            "Harus mencari nilai turunan matematis fungsinya",
            "Toleransi errornya selalu tinggi",
          ],
          correctAnswer: 2,
        },
        {
          question:
            "Berapa jumlah titik tebakan awal yang diwajibkan untuk memulai perhitungan Metode Secant?",
          options: [
            "1 titik awal",
            "2 titik awal",
            "3 titik awal",
            "Tidak butuh titik tebakan",
          ],
          correctAnswer: 1,
        },
        {
          question:
            "Kapan sebuah proses iterasi dalam algoritma Metode Secant harus dihentikan?",
          options: [
            "Ketika nilai x berubah menjadi negatif",
            "Ketika Error Relatif lebih kecil atau sama dengan batas Toleransi",
            "Ketika grafik memotong sumbu Y",
            "Saat iterasi mencapai batas 5 kali putaran",
          ],
          correctAnswer: 1,
        },
        {
          question:
            "Berbeda dengan metode Biseksi (Bagi Dua), tebakan awal pada metode Secant...",
          options: [
            "Harus mengurung akar yang dicari",
            "Selalu menghasilkan error 0% di iterasi pertama",
            "Harus selalu bilangan bulat positif",
            "Tidak harus mengurung akar yang dicari",
          ],
          correctAnswer: 3,
        },
        {
          question:
            "Rumus iterasi Metode Secant didapatkan dengan mendekati kurva fungsi menggunakan garis apa?",
          options: [
            "Garis Singgung (Tangen)",
            "Garis Tali Busur (Secant)",
            "Garis Asimtot",
            "Garis Parabola",
          ],
          correctAnswer: 1,
        },
        {
          question:
            "Jika nilai fungsi pada dua tebakan awal sama persis, f(x0) = f(x1), apa yang akan terjadi pada perhitungan Secant?",
          options: [
            "Akar akan langsung ditemukan",
            "Perhitungan akan berlanjut lebih cepat",
            "Terjadi pembagian dengan nol (error)",
            "Error relatif menjadi negatif",
          ],
          correctAnswer: 2,
        },
      ];

      let quizSaatIni = [];

      // Fungsi Mengacak Array
      function acakArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      // Fungsi Membuat Tampilan HTML Soal
      function buatQuiz() {
        let kumpulanSoalDiacak = acakArray([...bankSoal]);
        quizSaatIni = kumpulanSoalDiacak.slice(0, 3);

        const quizContainer = document.getElementById("quiz-container");
        let htmlHTML = "";

        quizSaatIni.forEach((soal, indexSoal) => {
          htmlHTML += `
                <div class="question-block">
                    <div class="question-text"><span>${indexSoal + 1}.</span> ${soal.question}</div>
                    <div class="options-grid">
                `;

          soal.options.forEach((opsi, indexOpsi) => {
            htmlHTML += `
                        <label class="option-label">
                            <input type="radio" name="q${indexSoal}" value="${indexOpsi}">
                            <span class="option-text">${opsi}</span>
                        </label>
                    `;
          });

          htmlHTML += `</div></div>`;
        });

        quizContainer.innerHTML = htmlHTML;
      }

      // FUNGSI JAVASCRIPT UNTUK EFEK KLIK JAWABAN
      document.addEventListener("change", function (event) {
        if (event.target.type === "radio") {
          const name = event.target.name;
          const semuaOpsi = document.querySelectorAll(`input[name="${name}"]`);

          // Hapus gaya terpilih dari semua opsi di pertanyaan ini
          semuaOpsi.forEach((opt) => {
            opt.closest(".option-label").classList.remove("selected");
          });

          // Tambahkan gaya terpilih pada opsi yang diklik
          event.target.closest(".option-label").classList.add("selected");
        }
      });

      // FUNGSI PENAMBAHAN ANIMASI SKOR
      function animateScore(id, start, end, duration) {
        if (start === end) {
          document.getElementById(id).innerText = end;
          return;
        }
        let range = end - start;
        let current = start;
        let increment = end > start ? 1 : -1;
        let stepTime = Math.abs(Math.floor(duration / range));
        let obj = document.getElementById(id);
        let timer = setInterval(function () {
          current += increment;
          obj.innerText = current;
          if (current == end) {
            clearInterval(timer);
          }
        }, stepTime);
      }

      // Logika Pemeriksaan Jawaban
      function checkAnswers() {
        let skor = 0;
        const totalSoal = quizSaatIni.length;
        let semuaTerjawab = true;

        for (let i = 0; i < totalSoal; i++) {
          if (!document.querySelector(`input[name="q${i}"]:checked`)) {
            semuaTerjawab = false;
          }
        }

        if (!semuaTerjawab) {
          alert("Tolong jawab semua pertanyaan terlebih dahulu ya!");
          return;
        }

        for (let i = 0; i < totalSoal; i++) {
          const jawabanDipilih = document.querySelector(
            `input[name="q${i}"]:checked`,
          );
          const semuaOpsi = document.querySelectorAll(`input[name="q${i}"]`);
          const jawabanBenar = quizSaatIni[i].correctAnswer;

          semuaOpsi.forEach((opt) => {
            const label = opt.closest(".option-label");
            label.classList.add("disabled");
            label.classList.remove("selected"); // Hapus efek klik ungu sebelumnya

            if (parseInt(opt.value) === jawabanBenar) {
              label.classList.add("correct-answer");
            } else if (opt.checked && parseInt(opt.value) !== jawabanBenar) {
              label.classList.add("wrong-answer");
            }
          });

          if (parseInt(jawabanDipilih.value) === jawabanBenar) {
            skor++;
          }
        }

        const persentase = Math.round((skor / totalSoal) * 100);

        document.getElementById("submit-btn").style.display = "none";
        const resultBox = document.getElementById("result-box");
        resultBox.style.display = "block";

        animateScore("score-display", 0, persentase, 1200);

        const feedbackTitle = document.getElementById("feedback-title");
        const feedbackText = document.getElementById("feedback-text");

        if (persentase === 100) {
          feedbackTitle.innerText = "Luar Biasa! 🎉";
          feedbackText.innerText =
            "Kamu sudah sangat menguasai konsep Metode Secant. Siap untuk ujian nih!";
        } else if (persentase >= 66) {
          feedbackTitle.innerText = "Kerja Bagus! 👍";
          feedbackText.innerText =
            "Hampir sempurna! Ada satu detail kecil yang terlewat, periksa bagian yang berwarna merah.";
        } else {
          feedbackTitle.innerText = "Jangan Menyerah! 💪";
          feedbackText.innerText =
            "Yuk baca-baca lagi materinya. Berlatih menggunakan kalkulator akan sangat membantu!";
        }

        setTimeout(() => {
          resultBox.scrollIntoView({ behavior: "smooth", block: "end" });
        }, 150);
      }

      window.onload = buatQuiz;
    </script>
  </body>
</html>
